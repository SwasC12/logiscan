<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="glow" x="-30%" y="-200%" width="160%" height="500%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0F172A"/>

  <!-- Corner brackets -->
  <!-- Top-left -->
  <polyline points="420,230 230,230 230,420" fill="none" stroke="white" stroke-width="52" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Top-right -->
  <polyline points="604,230 794,230 794,420" fill="none" stroke="white" stroke-width="52" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Bottom-left -->
  <polyline points="420,794 230,794 230,604" fill="none" stroke="white" stroke-width="52" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Bottom-right -->
  <polyline points="604,794 794,794 794,604" fill="none" stroke="white" stroke-width="52" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Barcode lines inside scan area -->
  <rect x="295" y="415" width="38" height="194" rx="4" fill="white" opacity="0.75"/>
  <rect x="350" y="415" width="20" height="194" rx="4" fill="white" opacity="0.75"/>
  <rect x="388" y="415" width="46" height="194" rx="4" fill="white" opacity="0.75"/>
  <rect x="451" y="415" width="24" height="194" rx="4" fill="white" opacity="0.75"/>
  <rect x="493" y="415" width="38" height="194" rx="4" fill="white" opacity="0.75"/>
  <rect x="549" y="415" width="20" height="194" rx="4" fill="white" opacity="0.75"/>
  <rect x="588" y="415" width="50" height="194" rx="4" fill="white" opacity="0.75"/>
  <rect x="656" y="415" width="26" height="194" rx="4" fill="white" opacity="0.75"/>
  <rect x="700" y="415" width="34" height="194" rx="4" fill="white" opacity="0.75"/>

  <!-- Glowing scan line -->
  <rect x="230" y="498" width="564" height="28" rx="14" fill="#F97316" filter="url(#glow)"/>

  <!-- Small route dots below — suggests tracking/logistics -->
  <circle cx="362" cy="860" r="14" fill="#F97316" opacity="0.9" filter="url(#softglow)"/>
  <line x1="376" y1="860" x2="454" y2="860" stroke="#F97316" stroke-width="6" stroke-dasharray="12,8" opacity="0.6"/>
  <circle cx="468" cy="860" r="10" fill="white" opacity="0.5"/>
  <line x1="478" y1="860" x2="546" y2="860" stroke="#F97316" stroke-width="6" stroke-dasharray="12,8" opacity="0.6"/>
  <circle cx="560" cy="860" r="10" fill="white" opacity="0.5"/>
  <line x1="570" y1="860" x2="638" y2="860" stroke="#F97316" stroke-width="6" stroke-dasharray="12,8" opacity="0.6"/>
  <circle cx="652" cy="860" r="14" fill="#F97316" opacity="0.9" filter="url(#softglow)"/>
</svg>
